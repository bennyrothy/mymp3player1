<style>
:root {
    --bg-main: #050608;
    --bg-panel: #111319;
    --bg-button: #1b1e26;
    --bg-button-active: #ff7a00;
    --bg-button-active-inner: #ff9a2e;
    --bg-button-border: #2a2e3a;
    --text-main: #f5f5f5;
    --text-dim: #aaaaaa;
    --accent: #ff7a00;
    --accent-soft: #ffb15a;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    background: #000;
    color: var(--text-main);
    min-height: 100vh;
}

.player-shell {
    background: none !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;

    border-radius: 0;
    box-shadow: none;

    position: fixed;
    top: 30px;
    left: 30px;
    padding: 0;
    width: 520px;
}

html, body {
    height: 100%;
    overflow: hidden;
}


.radio-screen {
    width: 100%;
    background: transparent; /* keep your transparent background */

    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
    margin-bottom: 12px;
    min-height: 90px;

    /* remove red glow + red border */
    box-shadow: none;

    box-sizing: border-box;
}



/* MAIN LED TEXT */
.radio-screen-line1,
.radio-screen-line2 {
    font-family: "Digital-7 Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #ffd08a;
    font-size: 22px;
    text-shadow:
        0 0 1px rgba(255, 200, 120, 1),
        0 0 2px rgba(255, 170, 80, 0.9);
    line-height: 24px;
    height: 24px;
    overflow: hidden;
    white-space: nowrap;
}

/* SMALLER MP3 TITLE */
.radio-screen-line2.mp3-title {
    font-size: 18px;
    line-height: 18px;
    letter-spacing: 0.05em;
    color: #ffb15a !important;
    text-shadow:
        0 0 1px rgba(255, 180, 80, 1),
        0 0 2px rgba(255, 150, 60, 0.9);
}

.live-red {
    color: #ff2600 !important;
    text-shadow:
        0 0 1px rgba(255, 0, 0, 1),
        0 0 2px rgba(255, 0, 0, 0.9);
}

/* TOP ROW */
.led-top-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    padding: 0 2px;
}

.led-bars {
    height: 16px;
    display: flex;
    align-items: flex-end;
}

.led-bars span {
    display: inline-block;
    width: 3px;
    height: 10px;
    margin-right: 2px;
    background: #ffd08a;
    opacity: 0.25;
    transform-origin: bottom;
}

.led-bars.playing span {
    animation: waveform 0.9s infinite ease-in-out;
}

.led-bars.playing span:nth-child(1) { animation-delay: 0s; }
.led-bars.playing span:nth-child(2) { animation-delay: 0.12s; }
.led-bars.playing span:nth-child(3) { animation-delay: 0.24s; }
.led-bars.playing span:nth-child(4) { animation-delay: 0.36s; }
.led-bars.playing span:nth-child(5) { animation-delay: 0.48s; }

@keyframes waveform {
    0%   { height: 6px; opacity: 0.5; }
    25%  { height: 14px; opacity: 0.9; }
    50%  { height: 10px; opacity: 0.7; }
    75%  { height: 16px; opacity: 1; }
    100% { height: 8px; opacity: 0.6; }
}

/* RADIO / USB */
.led-inputs span {
    font-family: "Digital-7 Mono", monospace;
    font-size: 14px;
    color: #ffd08a;
    margin-left: 8px;
    opacity: 0.35;
}

.led-inputs .active {
    opacity: 1;
}

/* VOL */
.led-bottom-row {
    text-align: left;
    padding-left: 2px;
    margin-top: 4px;
}

#ledVol {
    font-family: "Digital-7 Mono", monospace;
    font-size: 14px;
    color: #ffd08a;
    opacity: 0.35;
}

#ledVol.playing {
    opacity: 1;
}

/* BACKGROUND */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  z-index: -3;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: transparent;
  z-index: -2;
  pointer-events: none;
}

/* MODE BUTTONS */
.mode-row {
    display: flex;
    gap: 6px;
    margin: 10px 0 12px;
}

.mode-btn {
    flex: 1;
    background: var(--bg-button);
    border-radius: 6px;
    border: 1px solid var(--bg-button-border);
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 7px 4px;
    cursor: pointer;
    box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.03),
        0 0 0 1px #000,
        inset 0 0 0 1px rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    transition: box-shadow 0.25s ease, transform 0.1s ease;
}

.mode-btn.active {
    background: var(--bg-button-active);
    border-color: #ffb15a;
    color: #1b0b00;
    box-shadow:
        0 0 0 1px #000,
        inset 0 0 0 1px rgba(0, 0, 0, 0.6),
        0 0 18px rgba(255, 122, 0, 0.9);
    transform: translateY(1px);
}

/* MP3 CONTROL ROW */
.mp3-controls-row {
    display: none;
    margin-top: 12px;
    justify-content: center;
    gap: 14px;
}

.control-btn {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    border: 1px solid #2b3040;
    background: radial-gradient(circle at top, #262a38, #141722);
    color: #ffb15a;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
        0 1px 0 rgba(255,255,255,0.04),
        0 0 0 1px #000,
        inset 0 0 0 1px rgba(0,0,0,0.7);
    transition: transform 0.1s ease;
}

.control-btn:active {
    transform: translateY(1px);
}

.mp3-circle-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid #2b3040;
    background: radial-gradient(circle at top, #262a38, #141722);
    color: #ffb15a;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
        0 1px 0 rgba(255,255,255,0.04),
        0 0 0 1px #000,
        inset 0 0 0 1px rgba(0,0,0,0.7);
    transition: transform 0.1s ease;
}

.mp3-circle-btn:active {
    transform: translateY(1px);
}

/* TRANSPORT CONTROLS */
.transport-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 22px;
    margin-top: 18px;
}

.transport-btn {
    width: 46px;
    height: 46px;
    border-radius: 999px;
    border: 1px solid #2b3040;
    background: radial-gradient(circle at top, #262a38, #141722);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 0 1px #000,
        inset 0 0 0 1px rgba(0, 0, 0, 0.7);
}

.transport-btn svg {
    width: 20px;
    height: 20px;
    fill: var(--accent-soft);
}

.transport-btn:active {
    transform: translateY(1px);
}

/* VOLUME ROW */
.volume-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 16px 0 4px;
}

.vol-btn {
    width: 70px;
    height: 34px;
    border-radius: 6px;
    border: 1px solid #2b3040;
    background: radial-gradient(circle at top, #262a38, #141722);
    color: #ffb15a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
        0 1px 0 rgba(255,255,255,0.04),
        0 0 0 1px #000,
        inset 0 0 0 1px rgba(0,0,0,0.7);
}

.vol-btn:active {
    transform: translateY(1px);
}

.vol-slider {
    width: 220px;
    height: 4px;
    appearance: none;
    background: #333;
    border-radius: 4px;
    outline: none;
}

.vol-slider::-webkit-slider-runnable-track {
    height: 4px;
    background: #555;
    border-radius: 4px;
}

.vol-slider::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    background: #ffb15a;
    border-radius: 50%;
    cursor: pointer;
    margin-top: -5px;
}

/* ===========================
   MSN CHAT BOX (FINAL VERSION)
   =========================== */

.msn-window {
    width: 260px;
    height: 190px;

    background: rgba(255, 255, 255, 0.008); /* almost invisible */
    border: 1px solid rgba(255, 255, 255, 0.02); /* faint outline */
    border-radius: 12px;

    backdrop-filter: none;
    -webkit-backdrop-filter: none;

    box-shadow:
        0 0 0 1px rgba(255,255,255,0.01),
        0 3px 10px rgba(0,0,0,0.12); /* very soft float */

    display: flex;
    flex-direction: column;

    padding: 6px;
    margin-top: 320px;
    margin-left: 30px;
}


.msn-messages {
    flex: 1;
    overflow-y: auto;

    background: rgba(0,0,0,0.06); /* extremely soft */
    border-radius: 6px;

    padding: 4px;
    font-size: 12px;
    color: #fff;
}




.msn-toolbar img {
    width: 18px;
    height: 18px;
    cursor: pointer;
    opacity: 0.75; /* softer */
    transition: opacity 0.15s ease;
}

.msn-toolbar img:hover {
    opacity: 1;
}


.msn-input-area {
    display: flex;
    gap: 6px;
    margin-top: 6px;
}

.msn-input {
    flex: 1;
    min-height: 22px;
    font-size: 12px;
    padding: 5px;

    background: rgba(255,255,255,0.05); /* softer */
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;

    color: #fff;
    outline: none;
}


.msn-send {
    width: 55px;
    font-size: 12px;
    padding: 5px;

    background: rgba(255,255,255,0.05); /* soft */
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;

    cursor: pointer;
    color: #fff;
}

.msn-send:hover {
    background: rgba(255,255,255,0.10); /* gentle hover */
}

.msg {
    margin-bottom: 5px;
    padding: 4px 5px;
    background: rgba(255,255,255,0.20);
    border-radius: 4px;
    width: fit-content;
    max-width: 90%;
    font-size: 11px;
    color: #222;
}

.msg.you {
    margin-left: 0;
}

#visitorsToday {
    position: fixed;
    top: 520px;      /* adjust depending on your chat box height */
    left: 30px;      /* aligns with chat box left edge */

    font-size: 10px;
    letter-spacing: 0.5px;

    color: rgba(255,255,255,0.55); /* softer white */
    text-shadow: 0 0 3px rgba(0,0,0,0.35);

    pointer-events: none;
    z-index: 9999;
}




</style>

</div>

/* ===========================
       SHUFFLE ENGINE
       =========================== */

    const shuffleState = {
        mp3_1: { order: [], index: 0 },
        mp3_2: { order: [], index: 0 }
    };

    function getShuffleKey(mode) {
        return mode === MODE_MP3_1 ? "mp3_1" : "mp3_2";
    }

   

    function buildShuffleOrder(length) {
        const arr = [...Array(length).keys()];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

function isFirstTrack(mode) {
    const key = getShuffleKey(mode);
    const state = shuffleState[key];
    return state.index === 0;
}


    function ensureShuffle(mode) {
    const playlist = mode === MODE_MP3_1 ? playlist1 : playlist2;
    const key = getShuffleKey(mode);
    const state = shuffleState[key];

    if (!playlist.length) {
        state.order = [];
        state.index = -1;   // ⭐ no tracks played
        return;
    }

    if (state.order.length !== playlist.length) {
        state.order = buildShuffleOrder(playlist.length);
        state.index = -1;   // ⭐ first track not chosen yet
        return;
    }

    if (state.index >= state.order.length) {
        state.order = buildShuffleOrder(playlist.length);
        state.index = -1;   // ⭐ reset to “no track played”
    }
}


    function updateMp3Title(filename) {
        if (typeof filename !== "string") {
            console.warn("Invalid filename passed to updateMp3Title:", filename);
            radioScreenLine1.textContent =
                currentMode === MODE_MP3_1 ? "MP3 PLAYER 1" : "MP3 PLAYER 2";
            radioScreenLine2.textContent = "INVALID FILE";
            return;
        }

        let clean = filename.replace(/\.mp3$/i, "");
        clean = clean.replace(/^.*?\//, "");

        radioScreenLine1.textContent =
            currentMode === MODE_MP3_1 ? "MP3 PLAYER 1" : "MP3 PLAYER 2";
        radioScreenLine1.classList.remove("live-red");
        radioScreenLine1.classList.remove("mp3-title");

        radioScreenLine2.textContent = clean;
        radioScreenLine2.classList.add("mp3-title");
    }

    function getNextTrack(mode) {
    ensureShuffle(mode);
    const key = getShuffleKey(mode);
    const state = shuffleState[key];

    if (!state.order.length) return null;

    // ⭐ If this is the very first track, DO NOT increment
    if (state.index === -1) {
        state.index = 0;
        return state.order[state.index];
    }

    // ⭐ Normal behaviour after the first track
    state.index++;
    if (state.index >= state.order.length) state.index = 0;

    return state.order[state.index];
}

            radioScreenLine1.classList.add("flicker");
            radioScreenLine2.classList.add("flicker");
        }
    }

    }

    function fadeIn(audio, duration = 0.15) {
        const target = Math.round(parseInt(volSlider.value) / 10) * 10 / 100;
        const start = audio.volume;
        const step = (target - start) / (duration * 60);

        const fade = setInterval(() => {
            audio.volume = Math.min(target, audio.volume + step);
            if (audio.volume >= target) clearInterval(fade);
        }, 16);
    }

    function updateBarAnimation() {
        const bars = document.querySelector(".led-bars");
        if (isPlaying) {
            bars.classList.add("playing");

    function playRadio(index) {
        currentRadioIndex = (index + radioItems.length) % radioItems.length;
        const station = radioItems[currentRadioIndex];

        updateSonyHeader(station.name, "LIVE", true);

        requestAnimationFrame(() => {
            radioScreenLine2.classList.remove("mp3-title");
            radioScreenLine2.classList.add("live-red");
        });

        audioRadio.src = station.url;

        const targetVolume = volSlider.value / 100;
        audioRadio.load();

        if (station.name === "Atlantic Radio UK") {
            setPlayIcon(false);
            audioRadio.volume = 0;

            audioRadio.play().then(() => {
                isPlaying = true;
                updateBarAnimation();
                ledVol.classList.add("playing");

                setTimeout(() => {
                    audioRadio.volume = targetVolume;
                    setPlayIcon(true);
                }, 3000);
            }).catch(() => {
                isPlaying = false;
                updateBarAnimation();
                setPlayIcon(false);
                ledVol.classList.remove("playing");
            });

        } else {
            audioRadio.volume = targetVolume;

            audioRadio.play().then(() => {
                isPlaying = true;
                updateBarAnimation();
                setPlayIcon(true);
                fadeIn(audioRadio);
                ledVol.classList.add("playing");
            }).catch(() => {

                updateBarAnimation();
                setPlayIcon(false);

        radioScreenLine2.classList.remove("live-red");

        const headerLine2 =
            mode === MODE_MP3_1 ? "MP3 PLAYER 1" : "MP3 PLAYER 2";

        updateSonyHeader("LOADING", headerLine2, false);

        audioRadio.pause();
        audioRadio.src = "";

        // ⭐ THIS WAS MISSING — resets track position so PREV is disabled
        mp3TrackNumber = 0;

        setTimeout(() => {
            const playlist = mode === MODE_MP3_1 ? playlist1 : playlist2;

            if (playlist.length > 0) {
                playNextMp3(mode);
            } else {
                updateSonyHeader(
                    mode === MODE_MP3_1 ? "NO TRACKS IN MP3 1" : "NO TRACKS IN MP3 2",
                    "ADD PLAYLIST",
                    true
                );
            }
        }, 50);
    }
}

   function playNextMp3(mode) {
    const playlist = mode === MODE_MP3_1 ? playlist1 : playlist2;
    const audio = mode === MODE_MP3_1 ? audioMp3_1 : audioMp3_2;

    if (!playlist.length) {
        updateSonyHeader(
            mode === MODE_MP3_1 ? "NO TRACKS IN MP3 1" : "NO TRACKS IN MP3 2",
            "ADD PLAYLIST",
            true
        );
        return;
    }

    const nextIndex = getNextTrack(mode);
    const entry = playlist[nextIndex];

    updateMp3Title(entry.name);

    audio.src = fixPath(entry.url);
    audio.volume = volSlider.value / 100;

    audio.play()
        .then(() => {
            isPlaying = true;
            updateBarAnimation();
            ledVol.classList.add("playing");
            mp3PlayPause.textContent = "⏸";

            mp3TrackNumber++;   // ⭐ correct place
        })
        .catch(() => {
            isPlaying = false;
            updateBarAnimation();
            ledVol.classList.remove("playing");
            mp3PlayPause.textContent = "▶";
        });
}


function playPreviousMp3(mode) {
    const playlist = mode === MODE_MP3_1 ? playlist1 : playlist2;
    const audio = mode === MODE_MP3_1 ? audioMp3_1 : audioMp3_2;

    if (!playlist.length) return;

    const key = getShuffleKey(mode);
    const state = shuffleState[key];

    if (!state.order.length) ensureShuffle(mode);

    // ⭐ If we're at the first track, do nothing
    if (state.index <= 0) {
        return;
    }

    // Move back one track
    state.index--;

    const prevIndex = state.order[state.index];
    const entry = playlist[prevIndex];

    updateMp3Title(entry.name);

    audio.src = fixPath(entry.url);
    audio.volume = volSlider.value / 100;
    audio.play();
}

        if (nowTs - last > hours24) {

        const audio = getCurrentAudio();
        if (!audio) return;

        let v = Math.round(parseInt(volSlider.value) / 10) * 10;
        volSlider.value = v;
        audio.volume = v / 100;

        if (audio.paused) {
            audio.play().then(() => {
                isPlaying = true;
                setPlayIcon(true);
                updateBarAnimation();
                ledVol.classList.add("playing");
                fadeIn(audio);
            });
        } else {
            audio.pause();
            isPlaying = false;
            setPlayIcon(false);
            updateBarAnimation();
            ledVol.classList.remove("playing");
        }
    });

    /* ===========================
       INITIAL STATE
       =========================== */

    currentMode = null;
    radioScreenLine1.textContent = "";
    radioScreenLine2.textContent = "";
    radioScreenLine2.classList.remove("live-red");
    setPlayIcon(false);

    applyVolumeToCurrentAudio(parseInt(volSlider.value));
    updateBarAnimation();

   

});
</script>

    
</body>
</html>
